login:
  post:
    tags:
      - Authentication
    summary: "User Login"
    description: "Authenticates a user and returns a JWT token for session management."
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - password
            properties:
              email:
                type: string
                format: email
                example: "user1@email.com"
              password:
                type: string
                format: password
                example: "StrongPassword123!"
    responses:
      '200':
        description: "Login Successful"
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: "The Bearer token to be used in the Authorization header."
                user:
                  type: object
                  properties:
                    role: { type: string, example: "Meeting Workflow Developer" }
      '401':
        description: "Unauthorized: Invalid email or password."