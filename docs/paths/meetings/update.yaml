patch:
  tags:
    - Meetings
  summary: Update meeting information
  description: >-
    Updates an existing meeting. Fields provided in the request will be updated; 
    omitted fields will remain unchanged. Supports file uploads for agenda and resolution.
  operationId: updateMeeting
  security:
    - cookieAuth: []
  parameters:
    - name: meeting_id
      in: path
      required: true
      description: The unique UUID of the meeting to update.
      schema:
        type: string
        format: uuid
      example: "meet_507f1f77bcf86cd799439011"
  requestBody:
    content:
      multipart/form-data:
        schema:
          $ref: '../../components/schemas/meetings.yaml#/UpdateMeetingRequest'
  responses:
    '200':
      description: OK - Meeting updated successfully.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/SuccessWrapper'
          example:
            success: true
            message: "Meeting 124 updated successfully."

    '400':
      description: Bad Request - Invalid data or malformed request.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "BAD_REQUEST"
            message: "Invalid meeting date format."

    '401':
      description: Unauthorized - User not logged in.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'

    '403':
      description: Forbidden - User lacks permission to edit this meeting.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "FORBIDDEN"
            message: "You do not have permission to modify this record."

    '404':
      description: Not Found - Meeting ID does not exist.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'

    '409':
      description: Conflict - Serial number already exists for this type.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "DUPLICATE_SERIAL"
            message: "Another meeting already uses this serial number for the selected type."

    '413':
      description: Payload Too Large - Uploaded PDF files are too big.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "FILE_TOO_LARGE"
            message: "The agenda PDF exceeds the 10MB limit."

    '415':
      description: Unsupported Media Type - Uploaded file is not a PDF.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "INVALID_FILE_TYPE"
            message: "Only PDF files are allowed for agendas and resolutions."

    '500':
      description: Internal Server Error.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'