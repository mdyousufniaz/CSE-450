post:
  tags:
    - Meetings
  summary: Create a new meeting
  description: Initializes a new meeting record. Checks for duplicate serial numbers within the same meeting type.
  operationId: createMeeting
  security:
    - cookieAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/meetings.yaml#/CreateMeetingRequest'
  responses:
    '201':
      description: Created - Meeting successfully initialized.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              data:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    example: "meet_abc123"
                  message:
                    type: string
                    example: "Meeting created successfully."

    '400':
      description: Bad Request - Missing required fields (serial_no or type).
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "VALIDATION_ERROR"
            message: "serial_no and type are required fields."

    '401':
      description: Unauthorized - Session missing or expired.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "UNAUTHORIZED"
            message: "You must be logged in to create a meeting."

    '403':
      description: Forbidden - Insufficient permissions (e.g., Reader role trying to create).
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "FORBIDDEN_ACCESS"
            message: "Only administrators can create new meetings."

    '409':
      description: Conflict - A meeting with this serial number and type already exists.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "DUPLICATE_MEETING"
            message: "A Syndicate meeting with serial number 124 already exists."

    '422':
      description: Unprocessable Entity - Invalid date format or logic errors.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "INVALID_DATA"
            message: "The meeting date cannot be in the past."

    '500':
      description: Internal Server Error.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "SERVER_ERROR"
            message: "Database failed to persist meeting record."