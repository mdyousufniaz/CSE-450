get:
  tags:
    - Meetings
  summary: List all meetings
  description: Retrieves a paginated list of meetings with support for filtering by date range, type, and status.
  operationId: listMeetings
  security:
    - cookieAuth: []
  parameters:
    - name: start_date
      in: query
      description: Filter meetings occurring on or after this date.
      schema:
        type: string
        format: date
      example: "2026-01-01"
    - name: end_date
      in: query
      description: Filter meetings occurring on or before this date.
      schema:
        type: string
        format: date
      example: "2026-12-31"
    - name: type
      in: query
      description: Filter by meeting category.
      schema:
        type: string
        enum: [SYNDICATE, ACADEMIC]
    - name: status
      in: query
      description: Filter by meeting status.
      schema:
        type: string
        enum: [DRAFT, ONGOING, COMPLETED, CANCELLED]
    - name: sort
      in: query
      description: Sort order by date. Defaults to 'desc'.
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    - name: offset
      in: query
      description: Number of items to skip.
      schema:
        type: integer
        minimum: 0
        default: 0
    - name: limit
      in: query
      description: Number of items to return per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
  responses:
    '200':
      description: OK - List of meetings retrieved successfully.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/meetings.yaml#/MeetingListResponse'
    
    '206':
      description: Partial Content - Successful pagination response.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/meetings.yaml#/MeetingListResponse'

    '304':
      description: Not Modified - Data has not changed since last request.

    '400':
      description: Bad Request - Invalid query parameters (e.g., end_date before start_date).
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "INVALID_QUERY_PARAMS"
            message: "The 'end_date' must be after the 'start_date'."

    '401':
      description: Unauthorized - Session expired.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "UNAUTHORIZED"
            message: "Authentication is required to view the meeting list."

    '500':
      description: Internal Server Error.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "SERVER_ERROR"
            message: "Failed to fetch meetings from the database."