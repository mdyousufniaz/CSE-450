get:
  tags:
    - Authentication
  summary: Get current user profile
  description: Returns profile information for the authenticated user based on the session cookie.
  operationId: getMe
  security:
    - bearerAuth: [] # Or cookieAuth depending on your setup
  responses:
    '200':
      description: OK - User details retrieved successfully.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/users.yaml#/UserResponse'

    '304':
      description: Not Modified - Client has a cached version of the profile.
      # No body returned for 304

    '400':
      description: Bad Request - The request or headers are malformed.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'

    '401':
      description: Unauthorized - Session is expired or missing.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "UNAUTHORIZED"
            message: "Your session has expired. Please log in again."

    '403':
      description: Forbidden - User account is deactivated.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "ACCOUNT_DEACTIVATED"
            message: "Your account has been suspended. Please contact the administrator."

    '404':
      description: Not Found - User record no longer exists.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "USER_NOT_FOUND"
            message: "The user profile associated with this session could not be found."

    '429':
      description: Too Many Requests - Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "RATE_LIMIT_EXCEEDED"
            message: "Too many requests. Please wait 60 seconds before trying again."

    '500':
      description: Internal Server Error - Database connection failed.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "DATABASE_ERROR"
            message: "A connection error occurred while retrieving the profile."