post:
  tags:
    - Authentication
  summary: Authenticate user
  description: Verifies credentials and returns a session token via an HttpOnly cookie.
  operationId: signIn
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/auth.yaml#/SignInRequest'

  responses:
    responses:
    '201':
      description: Session Created successfully.
      headers:
        Set-Cookie:
          schema:
            type: string
            example: session_token=abc123xyz; HttpOnly; Secure; SameSite=Strict
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/auth.yaml#/AuthSuccess'

    '400':
      description: Bad Request - Malformed syntax or missing required fields.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "BAD_REQUEST"
            message: "The request body is not valid JSON."

    '401':
      description: Unauthorized - Invalid email or password.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "INVALID_CREDENTIALS"
            message: "The email or password provided is incorrect."

    '403':
      description: Forbidden - Account is deactivated.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "ACCOUNT_DISABLED"
            message: "Your account has been deactivated by an admin."

    '422':
      description: Unprocessable Entity - Validation Errors.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "VALIDATION_ERROR"
            message: "Email must be a valid university address."

    '429':
      description: Too Many Requests - Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "RATE_LIMIT_EXCEEDED"
            message: "Too many login attempts. Please try again in 15 minutes."

    '500':
      description: Internal Server Error.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/common.yaml#/ErrorResponse'
          example:
            success: false
            error_code: "INTERNAL_SERVER_ERROR"
            message: "An unexpected error occurred on the server."