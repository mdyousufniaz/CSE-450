openapi: 3.1.0

info:
  title: "BUET e-council: Digital Governance & Archiving Platform"
  description: "An integrated platform for document digitization, meeting workflow automation, and intelligent search."
  version: "1.0.0"

components:
  securitySchemes:
    bearerAuth:            # Defines the JWT requirement globally 
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /auth/login:
    $ref: './paths/auth/login.yaml'
  /auth/refresh:
    $ref: './paths/auth/refresh_token.yaml'
  /auth/logout:
    $ref: './paths/auth/logout.yaml'

  /meetings:
    $ref: './paths/meetings/list.yaml'
  /meetings/create:
    $ref: './paths/meetings/create.yaml'
  /meetings/{id}:
    $ref: './paths/meetings/update.yaml'
  /meetings/{id}/participants:
    $ref: './paths/meetings/add-participants.yaml'
  