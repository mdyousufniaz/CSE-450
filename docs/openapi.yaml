openapi: 3.0.0
info:
  title: Auth Service API
  version: 1.0.0
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_token # This must match the name used in sign-in

paths:
  /api/auth/signin:
    $ref: './paths/auth/sign-in.yaml'
  /api/auth/me:
    $ref: './paths/auth/me.yaml'
  /api/auth/sessions:
    $ref: './paths/auth/sessions.yaml'
  /api/auth/sessions/{sessionId}:
    $ref: './paths/auth/delete-session.yaml'
  /api/auth/signout:
    $ref: './paths/auth/sign-out.yaml'
  /api/auth/signout-all:
    $ref: './paths/auth/sign-out-all.yaml'